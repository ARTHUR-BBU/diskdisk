<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>

  <!-- 扫帚图标 -->
  <g transform="translate(120, 100)">
    <!-- 扫帚柄 -->
    <rect x="220" y="20" width="20" height="280" rx="10" fill="#ffffff" opacity="0.9"/>

    <!-- 扫帚头 -->
    <rect x="100" y="260" width="260" height="100" rx="15" fill="#ffffff" opacity="0.9"/>

    <!-- 扫帚毛 -->
    <g opacity="0.7">
      <rect x="120" y="340" width="15" height="60" rx="7" fill="#ffffff"/>
      <rect x="145" y="340" width="15" height="70" rx="7" fill="#ffffff"/>
      <rect x="170" y="340" width="15" height="80" rx="7" fill="#ffffff"/>
      <rect x="195" y="340" width="15" height="80" rx="7" fill="#ffffff"/>
      <rect x="220" y="340" width="15" height="70" rx="7" fill="#ffffff"/>
      <rect x="245" y="340" width="15" height="60" rx="7" fill="#ffffff"/>
      <rect x="270" y="340" width="15" height="80" rx="7" fill="#ffffff"/>
      <rect x="295" y="340" width="15" height="70" rx="7" fill="#ffffff"/>
      <rect x="320" y="340" width="15" height="60" rx="7" fill="#ffffff"/>
    </g>

    <!-- 闪光效果 -->
    <g opacity="0.6">
      <circle cx="80" cy="100" r="8" fill="#ffffff"/>
      <circle cx="330" cy="80" r="12" fill="#ffffff"/>
      <circle cx="340" cy="200" r="6" fill="#ffffff"/>
    </g>
  </g>
</svg>
